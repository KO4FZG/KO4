# ═══════════════════════════════════════════════════════════════
#  KO4OS Package Manager Configuration
#  Default location: /etc/ko4/ko4.conf
# ═══════════════════════════════════════════════════════════════

# ── Core Behavior ────────────────────────────────────────────────
# Ask for confirmation before install/remove/upgrade
confirm = true

# Colorize terminal output
color = true

# Show progress bars and spinners
progress = true

# ── Install Settings ─────────────────────────────────────────────
# Root directory for installations (change for chroot/sysroot work)
install_root = /

# Default architecture
default_arch = x86_64

# Keep downloaded .ko4pkg files in cache after install
keep_cache = true

# ── Build Settings ───────────────────────────────────────────────
# Directory used for compiling packages from source
build_dir = /tmp/ko4-build

# Where source tarballs and patches live
source_dir = /usr/src/ko4

# Number of parallel make jobs (auto = detect CPU count)
jobs = auto

# Strip debug symbols from compiled binaries (saves space)
strip_binaries = true

# Compress man pages with gzip
compress_man = true

# Remove libtool .la files (almost always unneeded)
remove_libtool = true

# Run test suite during build (can be slow)
run_tests = false

# Keep build directory after build (useful for debugging)
keep_build_dir = false

# Maximum seconds a build is allowed to run before timeout
build_timeout = 3600

# ── Download Settings ────────────────────────────────────────────
# Number of parallel downloads
parallel_downloads = 3

# Verify GPG signatures on repo indexes and packages
verify_gpg = false

# ── Log Settings ─────────────────────────────────────────────────
# Log verbosity: debug | info | warn | error
log_level = info

# Maximum log file size before rotation (K, M, G suffix supported)
max_log_size = 10M
